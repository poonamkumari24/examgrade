<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Exam Grade - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

<style>

body{
    background:#f3f6fb;
    font-family:system-ui,-apple-system,sans-serif;
}

/* CENTER */
.register-wrapper{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CARD */
.register-card{
    background:#fff;
    padding:42px;
    border-radius:14px;
    width:100%;
    max-width:520px;
    box-shadow:0 12px 32px rgba(0,0,0,0.08);
}

/* BRAND */
.brand{
    color:#2f6df6;
    font-weight:700;
}

/* INPUT */
.form-control{
    height:48px;
    border-radius:8px;
}

/* BUTTON */
.btn-register{
    background:#2f6df6;
    color:white;
    height:48px;
    border-radius:8px;
    font-weight:600;
}

.btn-register:hover{
    background:#2559cc;
    color:white;
}

/* TEXT */
.small-link{
    font-size:14px;
    text-decoration:none;
    color:#6c757d;
}

.small-link:hover{
    color:#2f6df6;
}

.password-note{
    font-size:13px;
    color:#6c757d;
}

</style>
</head>

<body>

<div class="register-wrapper">
<div class="register-card">

<!-- HEADER -->
<div class="text-center mb-4">
    <h3 class="brand"><i class="bi bi-mortarboard-fill fs-3"></i> Exam Grade</h3>
    <p class="text-muted mb-0">Create your account</p>
</div>



<!-- STUDENT REGISTER -->
<div>

<form id="studentForm">

    <div id="studentError" style="color:red; margin-bottom:10px;"></div>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" id="studentName" class="form-control" placeholder="Enter full name" required>
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" id="studentEmail" class="form-control" placeholder="Student email" required>
</div>

<div class="mb-2">
<label class="form-label">Password</label>
<input type="password" id="studentPassword" class="form-control"
       placeholder="Create password"
       minlength="8"
       required>
</div>

<div class="password-note mb-4">
must be at least 8 characters long.
</div>

<button class="btn btn-register w-100" type="submit">
Register as Student
</button>

</form>
</div>

<!-- LOGIN LINK -->
<div class="text-center mt-4">
<span class="text-muted">Already have an account?</span>
<a href="login.html" class="small-link fw-semibold">Login</a>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("studentForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const errorDiv = document.getElementById("studentError");
    errorDiv.innerHTML = "";

    const data = {
        name: document.getElementById("studentName").value,
        email: document.getElementById("studentEmail").value,
        password: document.getElementById("studentPassword").value,
        role: "STUDENT"
    };

    try {
        const response = await fetch("http://localhost:8080/api/users/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        console.log("Status:", response.status); // 🔥 debug
        console.log("Response:", result);

        if (response.ok) {
            alert("Registration successful"); // ✅ ONLY here
            window.location.href = "login.html";
        } else {
            // ❌ HANDLE ERROR PROPERLY
            if (typeof result === "object") {
                let errors = "";
                for (let key in result) {
                    errors += "• " + result[key] + "<br>";
                }
                errorDiv.innerHTML = errors;
            } else {
                errorDiv.innerHTML = result;
            }
        }

    } catch (error) {
        console.error(error);
        errorDiv.innerHTML = "Server error. Try again.";
    }
});
</script>

</body>
</html>
