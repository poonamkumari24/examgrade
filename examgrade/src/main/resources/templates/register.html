<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Exam Grade - Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f3f6fb;
    font-family:system-ui,-apple-system,sans-serif;
}

/* CENTER */
.register-wrapper{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* CARD */
.register-card{
    background:#fff;
    padding:42px;
    border-radius:14px;
    width:100%;
    max-width:520px;
    box-shadow:0 12px 32px rgba(0,0,0,0.08);
}

/* BRAND */
.brand{
    color:#2f6df6;
    font-weight:700;
}

/* ROLE TABS */
.role-tabs .nav-link{
    border-radius:8px;
    font-weight:500;
    color:#6c757d;
}

.role-tabs .nav-link.active{
    background:#2f6df6;
    color:#fff;
}

/* INPUT */
.form-control{
    height:48px;
    border-radius:8px;
}

/* BUTTON */
.btn-register{
    background:#2f6df6;
    color:white;
    height:48px;
    border-radius:8px;
    font-weight:600;
}

.btn-register:hover{
    background:#2559cc;
    color:white;
}

/* TEXT */
.small-link{
    font-size:14px;
    text-decoration:none;
    color:#6c757d;
}

.small-link:hover{
    color:#2f6df6;
}

.password-note{
    font-size:13px;
    color:#6c757d;
}

</style>
</head>

<body>

<div class="register-wrapper">
<div class="register-card">

<!-- HEADER -->
<div class="text-center mb-4">
    <h3 class="brand">Exam Grade</h3>
    <p class="text-muted mb-0">Create your account</p>
</div>

<!-- ROLE SELECTOR -->
<ul class="nav nav-pills nav-fill mb-4 role-tabs">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="pill" data-bs-target="#teacher">
Teacher
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="pill" data-bs-target="#student">
Student
</button>
</li>

</ul>

<div class="tab-content">

<!-- TEACHER REGISTER -->
<div class="tab-pane fade show active" id="teacher">

<form>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" placeholder="Enter full name" required>
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" placeholder="Teacher email" required>
</div>

<div class="mb-2">
<label class="form-label">Password</label>
<input type="password" class="form-control"
       placeholder="Create password"
       minlength="8"
       required>
</div>

<div class="password-note mb-4">
must be at least 8 characters long.
</div>

<button class="btn btn-register w-100">
Register as Teacher
</button>

</form>
</div>

<!-- STUDENT REGISTER -->
<div class="tab-pane fade" id="student">

<form>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" placeholder="Enter full name" required>
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" placeholder="Student email" required>
</div>

<div class="mb-2">
<label class="form-label">Password</label>
<input type="password" class="form-control"
       placeholder="Create password"
       minlength="8"
       required>
</div>

<div class="password-note mb-4">
must be at least 8 characters long.
</div>

<button class="btn btn-register w-100">
Register as Student
</button>

</form>
</div>

</div>

<!-- LOGIN LINK -->
<div class="text-center mt-4">
<span class="text-muted">Already have an account?</span>
<a href="login.html" class="small-link fw-semibold">Login</a>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
