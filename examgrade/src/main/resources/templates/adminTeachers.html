<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Manage Teachers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
    font-family:system-ui,-apple-system,sans-serif;
    background:#f3f6fb;
}

/* Header */
.page-title{
    font-size:24px;
    font-weight:700;
    color:black;
}

.page-subtitle{
    color:#6c757d;
    margin-top:5px;
}

/* Card Container */
.card-container{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* Buttons */
.btn-primary-custom{
    background:#2f6df6;
    color:white;
    border-radius:8px;
}

.btn-primary-custom:hover{
    background:#2559cc;
    color:white;
}

/* Table */
.table thead{
    background:#f1f5f9;
}

.status-active{
    background:#d1fae5;
    color:#065f46;
    padding:4px 10px;
    border-radius:20px;
    font-size:13px;
}

.status-inactive{
    background:#fee2e2;
    color:#7f1d1d;
    padding:4px 10px;
    border-radius:20px;
    font-size:13px;
}

.action-btn{
    border:none;
    background:none;
    margin-right:8px;
}

.action-btn.edit{
    color:#2f6df6;
}

.action-btn.delete{
    color:#dc3545;
}
.breadcrumb-item + .breadcrumb-item::before {
    content: ">";
}

</style>
</head>

<body>

<div class="container py-5">

<!-- Breadcrumb -->
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="admindashboard.html">Home</a></li>
    <li class="breadcrumb-item active">Teachers</li>
  </ol>
</nav>

<!-- Title Section -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <div class="page-title">TEACHER DIRECTORY</div>
        <div class="page-subtitle">
            Manage access and permissions for teaching staff.
        </div>
    </div>
    <button class="btn btn-primary-custom">
        + Add New Teacher
    </button>
</div>

<!-- Card -->
<div class="card-container">

    <!-- SEARCH + FILTER + EXPORT (Moved Above Table) -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div style="width:350px;">
            <div class="input-group" style="background:#f3f6fb; border-radius:8px;">
                <span class="input-group-text border-0" style="background:#f3f6fb;">
                    <i class="fa fa-search text-muted"></i>
                </span>
                <input type="text"
                       class="form-control border-0"
                       placeholder="Search teachers..."
                       style="background:#f3f6fb; box-shadow:none;">
            </div>
        </div>

        <div>
            <button class="btn btn-outline-secondary me-2">
                <i class="fa fa-filter me-1"></i> Filter
            </button>
            <button class="btn btn-outline-success">
                <i class="fa fa-file-export me-1"></i> Export
            </button>
        </div>

    </div>

    <!-- TABLE -->
    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>NAME</th>
                    <th>EMAIL</th>
                    <th>STATUS</th>
                    <th class="text-end">ACTIONS</th>
                </tr>
            </thead>
            <tbody>

                <tr>
                    <td>#T001</td>
                    <td>John Smith</td>
                    <td>john@example.com</td>
                    <td><span class="status-active">Active</span></td>
                    <td class="text-end">
                        <button class="action-btn edit"><i class="fa fa-pen"></i></button>
                        <button class="action-btn delete"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>

                <tr>
                    <td>#T002</td>
                    <td>Priya Sharma</td>
                    <td>priya@example.com</td>
                    <td><span class="status-inactive">Inactive</span></td>
                    <td class="text-end">
                        <button class="action-btn edit"><i class="fa fa-pen"></i></button>
                        <button class="action-btn delete"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>

                <tr>
                    <td>#T003</td>
                    <td>Michael Lee</td>
                    <td>michael@example.com</td>
                    <td><span class="status-active">Active</span></td>
                    <td class="text-end">
                        <button class="action-btn edit"><i class="fa fa-pen"></i></button>
                        <button class="action-btn delete"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>

            </tbody>
        </table>
    </div>

    <!-- PAGINATION -->
    <div class="d-flex justify-content-between align-items-center mt-4">

        <div class="text-muted">
            Showing 1 to 3 of 24 teachers
        </div>

        <div>
            <button class="btn btn-outline-secondary me-2">
                <i class="fa fa-chevron-left"></i>
            </button>
            <button class="btn btn-outline-secondary">
                <i class="fa fa-chevron-right"></i>
            </button>
        </div>

    </div>

</div>

</div>

</body>
</html>
