<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Manage Teachers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
    font-family:system-ui,-apple-system,sans-serif;
    background:#f3f6fb;
}

/* Header */
.page-title{
    font-size:24px;
    font-weight:700;
    color:black;
}

.page-subtitle{
    color:#6c757d;
    margin-top:5px;
}

.custom-card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* Buttons */
.btn-primary-custom{
    background:#2f6df6;
    color:white;
    border-radius:8px;
}

.btn-primary-custom:hover{
    background:#2559cc;
    color:white;
}

/* Table */
.table thead{
    background:#f1f5f9;
}

.status-active{
    background:#d1fae5;
    color:#065f46;
    padding:4px 10px;
    border-radius:20px;
    font-size:13px;
}

.status-inactive{
    background:#fee2e2;
    color:#7f1d1d;
    padding:4px 10px;
    border-radius:20px;
    font-size:13px;
}

.action-btn{
    border:none;
    background:none;
    margin-right:8px;
}

.action-btn.edit{
    color:#2f6df6;
}

.action-btn.delete{
    color:#dc3545;
}
.breadcrumb-item + .breadcrumb-item::before {
    content: ">";
}
/* STATUS BADGE */
.status-enabled{
    background:#dcfce7;
    color:#166534;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
}

.status-disabled{
    background:#fee2e2;
    color:#991b1b;
    padding:6px 12px;
    border-radius:20px;
    font-size:13px;
}

</style>
</head>

<body>

<div class="container py-5">

<!-- Breadcrumb -->
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="adminDashboard.html">Home</a></li>
    <li class="breadcrumb-item active">Teachers</li>
  </ol>
</nav>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center flex-wrap mb-4">

<div>
<div class="page-title">Manage Teachers</div>
<div class="page-subtitle">
Create, update, enable or disable teacher accounts.
</div>
</div>

<button class="btn btn-primary-custom px-4 py-2"
        data-bs-toggle="modal"
        data-bs-target="#teacherModal">
<i class="fa-solid fa-plus me-2"></i>
Add Teacher
</button>

</div>

<!-- ALERT -->
<div id="alertBox"></div>

<!-- CARD -->
<div class="custom-card">

<!-- SEARCH -->
<div class="d-flex justify-content-between align-items-center flex-wrap mb-4">

<input type="text"
       class="form-control"
       placeholder="Search by name or email..."
       style="max-width:300px;"
       id="searchInput">

</div>

<!-- TABLE -->
<div class="table-responsive">

<table class="table align-middle">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Subject</th>
<th>Department</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="teacherTableBody">

</tbody>

</table>

</div>

</div>

</div>

<!-- MODAL -->
<div class="modal fade" id="teacherModal" tabindex="-1">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Add Teacher</h5>

<button type="button"
        class="btn-close"
        data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<form id="teacherForm">

<div class="row g-3">

<div class="col-md-6">
<label class="form-label">Full Name</label>
<input type="text"
       class="form-control"
       id="name"
       required>
</div>

<div class="col-md-6">
<label class="form-label">Email</label>
<input type="email"
       class="form-control"
       id="email"
       required>
</div>

<div class="col-md-6">
<label class="form-label">Password</label>
<input type="password"
       class="form-control"
       id="password"
       required>
</div>

<div class="col-md-6">
<label class="form-label">Subject</label>
<input type="text"
       class="form-control"
       id="subject">
</div>

<div class="col-md-6">
<label class="form-label">Phone</label>
<input type="text"
       class="form-control"
       id="phone">
</div>

<div class="col-md-6">
<label class="form-label">Department</label>
<input type="text"
       class="form-control"
       id="department">
</div>

</div>

</form>

</div>

<div class="modal-footer">

<button class="btn btn-secondary"
        data-bs-dismiss="modal">
Close
</button>

<button class="btn btn-primary-custom"
        id="saveTeacherBtn">
Save Teacher
</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API_URL = "http://localhost:8080/api/admin/teachers";

const token = localStorage.getItem("token");

const user = JSON.parse(localStorage.getItem("user"));

/* AUTH CHECK */
if (!token || !user) {
    window.location.href = "login.html";
}

if (user.role !== "ROLE_ADMIN") {
    alert("Access Denied");
    window.location.href = "login.html";
}

/* LOAD TEACHERS */
async function loadTeachers() {

    try {

        const response = await fetch(API_URL, {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        if (response.status === 401 || response.status === 403) {
            alert("Unauthorized");
            window.location.href = "login.html";
            return;
        }

        const teachers = await response.json();

        const tableBody = document.getElementById("teacherTableBody");

        tableBody.innerHTML = "";

        teachers.forEach(teacher => {

            tableBody.innerHTML += `
                <tr>

                    <td>${teacher.id}</td>

                    <td>${teacher.name}</td>

                    <td>${teacher.email}</td>

                    <td>${teacher.subject || "-"}</td>

                    <td>${teacher.department || "-"}</td>

                    <td>
                        ${
                            teacher.enabled
                            ?
                            `<span class="status-enabled">Enabled</span>`
                            :
                            `<span class="status-disabled">Disabled</span>`
                        }
                    </td>

                    <td>

                        <button class="btn btn-sm btn-warning"
                                onclick="editTeacher(${teacher.id})">
                            Edit
                        </button>

                        <button class="btn btn-sm btn-danger"
                                onclick="deleteTeacher(${teacher.id})">
                            Delete
                        </button>

                        <button class="btn btn-sm btn-secondary"
                                onclick="toggleTeacherStatus(${teacher.id})">
                            Toggle
                        </button>

                    </td>

                </tr>
            `;

        });

    } catch(error) {

        console.error(error);

        showAlert("danger", "Failed to load teachers");

    }

}

/* ADD TEACHER */
document.getElementById("saveTeacherBtn")
.addEventListener("click", addTeacher);

async function addTeacher() {

    const teacherData = {

        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        subject: document.getElementById("subject").value,
        phone: document.getElementById("phone").value,
        department: document.getElementById("department").value

    };

    try {

        const response = await fetch(API_URL, {

            method: "POST",

            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },

            body: JSON.stringify(teacherData)

        });

        const data = await response.json();

        if (!response.ok) {

            showAlert("danger", data.error || "Failed to add teacher");

            return;
        }

        showAlert("success", "Teacher added successfully");

        document.getElementById("teacherForm").reset();

        bootstrap.Modal.getInstance(
            document.getElementById("teacherModal")
        ).hide();

        loadTeachers();

    } catch(error) {

        console.error(error);

        showAlert("danger", "Server error");

    }

}

/* DELETE */
async function deleteTeacher(id) {

    if (!confirm("Delete this teacher?")) return;

    try {

        const response = await fetch(`${API_URL}/${id}`, {

            method: "DELETE",

            headers: {
                "Authorization": "Bearer " + token
            }

        });

        if (response.ok) {

            showAlert("success", "Teacher deleted");

            loadTeachers();

        } else {

            showAlert("danger", "Delete failed");

        }

    } catch(error) {

        console.error(error);

    }

}

/* TOGGLE STATUS */
async function toggleTeacherStatus(id) {

    try {

        const response = await fetch(
            `${API_URL}/${id}/toggle-status`,
            {
                method: "PATCH",

                headers: {
                    "Authorization": "Bearer " + token
                }
            }
        );

        if (response.ok) {

            showAlert("success", "Teacher status updated");

            loadTeachers();

        }

    } catch(error) {

        console.error(error);

    }

}

/* EDIT */
async function editTeacher(id) {

    try {

        const response = await fetch(`${API_URL}/${id}`, {

            headers: {
                "Authorization": "Bearer " + token
            }

        });

        const teacher = await response.json();

        document.getElementById("name").value = teacher.name;
        document.getElementById("email").value = teacher.email;
        document.getElementById("subject").value = teacher.subject;
        document.getElementById("phone").value = teacher.phone;
        document.getElementById("department").value = teacher.department;

        document.getElementById("password").value = "";

        const modal = new bootstrap.Modal(
            document.getElementById("teacherModal")
        );

        modal.show();

        document.getElementById("saveTeacherBtn")
        .innerText = "Update Teacher";

        document.getElementById("saveTeacherBtn")
        .onclick = function() {
            updateTeacher(id);
        };

    } catch(error) {

        console.error(error);

    }

}

/* UPDATE */
async function updateTeacher(id) {

    const updatedData = {

        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        subject: document.getElementById("subject").value,
        phone: document.getElementById("phone").value,
        department: document.getElementById("department").value

    };

    try {

        const response = await fetch(`${API_URL}/${id}`, {

            method: "PUT",

            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },

            body: JSON.stringify(updatedData)

        });

        if (response.ok) {

            showAlert("success", "Teacher updated");

            bootstrap.Modal.getInstance(
                document.getElementById("teacherModal")
            ).hide();

            loadTeachers();

            document.getElementById("saveTeacherBtn")
            .innerText = "Save Teacher";

        }

    } catch(error) {

        console.error(error);

    }

}

/* SEARCH */
document.getElementById("searchInput")
.addEventListener("keyup", searchTeachers);

function searchTeachers() {

    const value = document.getElementById("searchInput")
    .value
    .toLowerCase();

    const rows = document.querySelectorAll("#teacherTableBody tr");

    rows.forEach(row => {

        const text = row.innerText.toLowerCase();

        row.style.display =
            text.includes(value)
            ?
            ""
            :
            "none";

    });

}

/* ALERT */
function showAlert(type, message) {

    document.getElementById("alertBox").innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show">
            ${message}

            <button class="btn-close"
                    data-bs-dismiss="alert"></button>
        </div>
    `;

}



/* LOAD */
loadTeachers();

</script>
</body>
</html>
