<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body style="background:#f5f7fb;">

<div class="container mt-4">

<!-- Top Navbar -->
<div class="d-flex justify-content-between align-items-center mb-4">

<nav style="font-size:14px;">
<a href="teacherdashboard.html" style="text-decoration:none;">Home</a>
<span> > </span>
<a href="#" style="text-decoration:none;">Teacher</a>
<span> > </span>
<span>Create Quiz</span>
</nav>

<div class="d-flex align-items-center gap-3">

<i class="fa-solid fa-bell fa-lg"></i>

<div class="d-flex align-items-center gap-2">
<i class="fa-solid fa-user-tie"></i>

<div>
<div style="font-weight:600;">Teacher Name</div>
<small style="color:gray;">Teacher</small>
</div>

</div>
</div>
</div>


<!-- Heading -->
<h3 style="font-weight:bold;">Create New Quiz</h3>
<p style="color:gray;">Configure the details and setting for your new assessment.</p>


<!-- Quiz Details -->
<div class="card shadow-sm mt-4">
<div class="card-body">

<h6 style="font-weight:600;">
<i class="fa-solid fa-pen me-2 text-primary"></i>Quiz Details
</h6>

<div class="mt-3">
<label class="form-label">Quiz Title</label>
<input type="text" class="form-control" id="quizTitle"
placeholder="eg. Mid-term History Exam : World War II">
</div>

<div class="row mt-3">

<div class="col-md-6">
    <label class="form-label">Subject</label>
    <input
        type="text"
        class="form-control"
        id="subject"
        placeholder="e.g. Computer Science">
</div>

<div class="col-md-6">
    <label class="form-label">Class Group</label>
    <input
        type="text"
        class="form-control"
        id="classGroup"
        placeholder="e.g. Grade 10">
</div>

</div>

<div class="mt-3">
<label class="form-label">Description / Instructions</label>
<textarea class="form-control"  id="description"rows="4"
placeholder="Enter specific instructions for the students..."></textarea>
</div>

</div>
</div>


<!-- Parameters -->
<div class="card shadow-sm mt-4">
<div class="card-body">

<h6 style="font-weight:600;">
<i class="fa-solid fa-sliders me-2 text-primary"></i>Parameters
</h6>

<div class="row mt-3">

<div class="col-md-4">
<label>Total Marks</label>
<input type="number" class="form-control" id="totalMarks">
</div>

<div class="col-md-4">
<label>Duration (minutes)</label>
<input type="number" class="form-control" id="durationMinutes">
</div>

<div class="col-md-4">
<label>Passing Score (%)</label>
<input type="number" class="form-control" id="passingScore">
</div>

</div>

</div>
</div>


<!-- Add Question -->
<div class="card shadow-sm mt-4">

<div class="card-body">

<div class="d-flex justify-content-between align-items-center">

<h6 style="font-weight:600;">
<i class="fa-solid fa-circle-question text-primary me-2"></i>
Add New Question
</h6>

<button class="btn btn-outline-secondary btn-sm">
<i class="fa-solid fa-file"></i> Draft
</button>

</div>

<div class="mt-3">

<label>Question Text</label>
<input type="text" class="form-control" id="questionText"
placeholder="eg. What is the...">

</div>

<div class="mt-4">

<label>Answer Options</label>

<small style="color:gray; display:block; margin-bottom:10px;">
Select the radio button to mark the correct answer
</small>

<div class="row g-3">

<div class="col-md-6">
<div class="input-group">
<div class="input-group-text"><input type="radio" name="correct" value="A"></div>
<span class="input-group-text">A</span>
<input type="text" class="form-control" id="optionA" placeholder="Option A text">
</div>
</div>

<div class="col-md-6">
<div class="input-group">
<div class="input-group-text"><input type="radio" name="correct" value="B"></div>
<span class="input-group-text">B</span>
<input type="text" class="form-control" id="optionB" placeholder="Option B text">
</div>
</div>

<div class="col-md-6">
<div class="input-group">
<div class="input-group-text"><input type="radio" name="correct" value="C"></div>
<span class="input-group-text">C</span>
<input type="text" class="form-control" id="optionC" placeholder="Option C text">
</div>
</div>

<div class="col-md-6">
<div class="input-group">
<div class="input-group-text"><input type="radio" name="correct" value="D"></div>
<span class="input-group-text">D</span>
<input type="text" class="form-control"  id="optionD" placeholder="Option D text">
</div>
</div>

</div>

</div>

<div class="mt-4 d-flex gap-2">

<button class="btn btn-outline-secondary">
<i class="fa-solid fa-xmark"></i> Cancel
</button>

<button class="btn btn-primary" onclick="saveQuestion()">
<i class="fa-solid fa-floppy-disk"></i> Save Question
</button>

</div>

</div>
</div>


<!-- Questions Added -->
<div class="card shadow-sm mt-4">

<div class="card-body">

<div class="d-flex justify-content-between align-items-center">

<h6 style="font-weight:600;">
<i class="fa-solid fa-list-check text-primary me-2"></i>
Questions Added
</h6>

<span class="badge bg-primary" id="questionCount">0 Questions</span>

</div>

<hr>

<div id="questionList">
<p style="color:gray;">No questions added yet.</p>
</div>

</div>
</div>


<!-- Save Quiz Buttons -->
<div class="mt-4 d-flex gap-2">

<button class="btn btn-outline-secondary">
<i class="fa-solid fa-xmark"></i> Cancel
</button>

<button class="btn btn-success" onclick="saveQuiz()">
<i class="fa-solid fa-floppy-disk"></i> Save Quiz
</button>

</div>

</div>


<script>
/* ==========================================================
   AUTHENTICATION CHECK
========================================================== */
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));

if (!token || !user) {
    window.location.href = "login.html";
}

if (user.role !== "ROLE_TEACHER") {
    alert("Access denied");
    window.location.href = "login.html";
}

/* ==========================================================
   SHOW TEACHER NAME
========================================================== */
const teacherNameElements = document.querySelectorAll(
    "h6, div[style*='font-weight:600;']"
);

teacherNameElements.forEach(el => {
    if (el.textContent.trim() === "Teacher Name") {
        el.textContent = user.name;
    }
});

/* ==========================================================
   QUESTIONS ARRAY
========================================================== */
let questions = [];

/* ==========================================================
   SAVE QUESTION TO LOCAL ARRAY
========================================================== */
function saveQuestion() {
    const questionText = document.getElementById("questionText").value.trim();
    const optionA = document.getElementById("optionA").value.trim();
    const optionB = document.getElementById("optionB").value.trim();
    const optionC = document.getElementById("optionC").value.trim();
    const optionD = document.getElementById("optionD").value.trim();

    const selectedRadio = document.querySelector(
        'input[name="correct"]:checked'
    );

    if (!questionText) {
        alert("Please enter question text.");
        return;
    }

    if (!optionA || !optionB || !optionC || !optionD) {
        alert("Please enter all four options.");
        return;
    }

    if (!selectedRadio) {
        alert("Please select the correct answer.");
        return;
    }

    // Determine correct option index
    const radios = document.querySelectorAll('input[name="correct"]');
    let correctIndex = 0;

    radios.forEach((radio, index) => {
        if (radio.checked) {
            correctIndex = index;
        }
    });

    // Create question object
    const question = {
        questionText: questionText,
        options: [
            {
                optionText: optionA,
                correct: correctIndex === 0
            },
            {
                optionText: optionB,
                correct: correctIndex === 1
            },
            {
                optionText: optionC,
                correct: correctIndex === 2
            },
            {
                optionText: optionD,
                correct: correctIndex === 3
            }
        ]
    };

    // Save in array
    questions.push(question);

    // Refresh UI
    renderQuestions();

    // Clear inputs
    clearQuestionForm();
}

/* ==========================================================
   RENDER QUESTIONS LIST
========================================================== */
function renderQuestions() {
    const questionList = document.getElementById("questionList");
    const questionCount = document.getElementById("questionCount");

    questionCount.innerText = questions.length + " Questions";

    if (questions.length === 0) {
        questionList.innerHTML =
            '<p style="color:gray;">No questions added yet.</p>';
        return;
    }

    questionList.innerHTML = "";

    questions.forEach((q, index) => {
        const div = document.createElement("div");

        div.className =
            "d-flex justify-content-between align-items-center border rounded p-2 mb-2";

        div.innerHTML = `
            <div>
                <strong>Q${index + 1}:</strong> ${q.questionText}
            </div>

            <button
                class="btn btn-sm btn-outline-danger"
                onclick="deleteQuestion(${index})">
                Delete
            </button>
        `;

        questionList.appendChild(div);
    });
}

/* ==========================================================
   DELETE QUESTION
========================================================== */
function deleteQuestion(index) {
    questions.splice(index, 1);
    renderQuestions();
}

/* ==========================================================
   CLEAR QUESTION FORM
========================================================== */
function clearQuestionForm() {
    document.getElementById("questionText").value = "";
    document.getElementById("optionA").value = "";
    document.getElementById("optionB").value = "";
    document.getElementById("optionC").value = "";
    document.getElementById("optionD").value = "";

    document.querySelectorAll('input[name="correct"]').forEach(r => {
        r.checked = false;
    });
}

/* ==========================================================
   SAVE QUIZ TO BACKEND
========================================================== */
async function saveQuiz() {
    // Validate basic fields
    const title = document.getElementById("quizTitle").value.trim();
    const subject = document.getElementById("subject").value;
    const classGroup = document.getElementById("classGroup").value;
    const description = document.getElementById("description").value.trim();
    const totalMarks = document.getElementById("totalMarks").value;
    const durationMinutes = document.getElementById("durationMinutes").value;
    const passingScore = document.getElementById("passingScore").value;

    if (!title) {
        alert("Please enter quiz title.");
        return;
    }

    if (questions.length === 0) {
        alert("Please add at least one question.");
        return;
    }

    // Build payload
    const quizData = {
        title: title,
        subject: subject,
        classGroup: classGroup,
        description: description,
        totalMarks: parseInt(totalMarks || 0),
        durationMinutes: parseInt(durationMinutes || 0),
        passingScore: parseInt(passingScore || 0),
        questions: questions
    };

    try {
        const response = await fetch(
            "http://localhost:8080/api/teacher/quizzes",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(quizData)
            }
        );

        const result = await response.json();

        if (response.ok) {
            alert("Quiz saved successfully!");

            // Reset everything
            document.location.reload();
        } else {
            alert(result.error || "Failed to save quiz.");
        }
    } catch (error) {
        console.error(error);
        alert("Server error.");
    }
}

/* ==========================================================
   INITIAL RENDER
========================================================== */
renderQuestions();
</script>

</body>
</html>
