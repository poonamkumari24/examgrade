<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Create Quiz</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body style="background:#f5f7fb;">

<div class="container mt-4">

<!-- Top Navbar -->
<div class="d-flex justify-content-between align-items-center mb-4">

<nav style="font-size:14px;">
<a href="teacherdashboard.html" style="text-decoration:none;">Home</a>
<span> > </span>
<a href="#" style="text-decoration:none;">Teacher</a>
<span> > </span>
<span>Create Quiz</span>
</nav>

<div class="d-flex align-items-center gap-3">

<i class="fa-solid fa-bell fa-lg"></i>

<div class="d-flex align-items-center gap-2">
<i class="fa-solid fa-user-tie"></i>

<div>
<div style="font-weight:600;">Teacher Name</div>
<small style="color:gray;">Teacher</small>
</div>

</div>
</div>
</div>


<!-- Heading -->
<h3 style="font-weight:bold;">Create New Quiz</h3>
<p style="color:gray;">Configure the details and setting for your new assessment.</p>


<!-- Quiz Details -->
<div class="card shadow-sm mt-4">
<div class="card-body">

<h6 style="font-weight:600;">
<i class="fa-solid fa-pen me-2 text-primary"></i>Quiz Details
</h6>

<div class="mt-3">
<label class="form-label">Quiz Title</label>
<input type="text" class="form-control"
placeholder="eg. Mid-term History Exam : World War II">
</div>

<div class="row mt-3">

<div class="col-md-6">
<label class="form-label">Subject</label>
<select class="form-select">
<option>Select a Subject</option>
<option>Mathematics</option>
<option>Physics</option>
<option>History</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Class Group</label>
<select class="form-select">
<option>Assign to a class</option>
<option>Grade 10</option>
<option>Grade 11</option>
<option>Grade 12</option>
</select>
</div>

</div>

<div class="mt-3">
<label class="form-label">Description / Instructions</label>
<textarea class="form-control" rows="4"
placeholder="Enter specific instructions for the students..."></textarea>
</div>

</div>
</div>


<!-- Parameters -->
<div class="card shadow-sm mt-4">
<div class="card-body">

<h6 style="font-weight:600;">
<i class="fa-solid fa-sliders me-2 text-primary"></i>Parameters
</h6>

<div class="row mt-3">

<div class="col-md-4">
<label>Total Marks</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4">
<label>Duration (minutes)</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4">
<label>Passing Score (%)</label>
<input type="number" class="form-control">
</div>

</div>

</div>
</div>


<!-- Add Question -->
<div class="card shadow-sm mt-4">

<div class="card-body">

<div class="d-flex justify-content-between align-items-center">

<h6 style="font-weight:600;">
<i class="fa-solid fa-circle-question text-primary me-2"></i>
Add New Question
</h6>

<button class="btn btn-outline-secondary btn-sm">
<i class="fa-solid fa-file"></i> Draft
</button>

</div>

<div class="mt-3">

<label>Question Text</label>
<input type="text" class="form-control" id="questionText"
placeholder="eg. What is the...">

</div>

<div class="mt-4">

<label>Answer Options</label>

<small style="color:gray; display:block; margin-bottom:10px;">
Select the radio button to mark the correct answer
</small>

<div class="row g-3">

<div class="col-md-6">
<div class="input-group">
<div class="input-group-text"><input type="radio" name="correct"></div>
<span class="input-group-text">A</span>
<input type="text" class="form-control" placeholder="Option A text">
</div>
</div>

<div class="col-md-6">
<div class="input-group">
<div class="input-group-text"><input type="radio" name="correct"></div>
<span class="input-group-text">B</span>
<input type="text" class="form-control" placeholder="Option B text">
</div>
</div>

<div class="col-md-6">
<div class="input-group">
<div class="input-group-text"><input type="radio" name="correct"></div>
<span class="input-group-text">C</span>
<input type="text" class="form-control" placeholder="Option C text">
</div>
</div>

<div class="col-md-6">
<div class="input-group">
<div class="input-group-text"><input type="radio" name="correct"></div>
<span class="input-group-text">D</span>
<input type="text" class="form-control" placeholder="Option D text">
</div>
</div>

</div>

</div>

<div class="mt-4 d-flex gap-2">

<button class="btn btn-outline-secondary">
<i class="fa-solid fa-xmark"></i> Cancel
</button>

<button class="btn btn-primary" onclick="saveQuestion()">
<i class="fa-solid fa-floppy-disk"></i> Save Question
</button>

</div>

</div>
</div>


<!-- Questions Added -->
<div class="card shadow-sm mt-4">

<div class="card-body">

<div class="d-flex justify-content-between align-items-center">

<h6 style="font-weight:600;">
<i class="fa-solid fa-list-check text-primary me-2"></i>
Questions Added
</h6>

<span class="badge bg-primary" id="questionCount">0 Questions</span>

</div>

<hr>

<div id="questionList">
<p style="color:gray;">No questions added yet.</p>
</div>

</div>
</div>


<!-- Save Quiz Buttons -->
<div class="mt-4 d-flex gap-2">

<button class="btn btn-outline-secondary">
<i class="fa-solid fa-xmark"></i> Cancel
</button>

<button class="btn btn-success" onclick="saveQuiz()">
<i class="fa-solid fa-floppy-disk"></i> Save Quiz
</button>

</div>

</div>


<script>

let questionNumber = 0;

function saveQuestion(){

const questionText = document.getElementById("questionText").value;

if(questionText.trim() === ""){
alert("Please enter a question");
return;
}

questionNumber++;

const questionList = document.getElementById("questionList");

const questionItem = document.createElement("div");

questionItem.className="d-flex justify-content-between align-items-center border rounded p-2 mb-2";

questionItem.innerHTML = `
<div>
<strong>Q${questionNumber}:</strong> ${questionText}
</div>

<div>
<button class="btn btn-sm btn-outline-danger" onclick="deleteQuestion(this)">Delete</button>
</div>
`;

if(questionNumber===1){
questionList.innerHTML="";
}

questionList.appendChild(questionItem);

document.getElementById("questionCount").innerText = questionNumber + " Questions";

document.getElementById("questionText").value="";

}

function deleteQuestion(btn){

btn.parentElement.parentElement.remove();

}

function saveQuiz(){

alert("Quiz Saved Successfully!");

}

</script>

</body>
</html>
