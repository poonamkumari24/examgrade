<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Subjects</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background-color:#f8f9fa;">

<div class="container mt-4">

<!-- Breadcrumb -->
<nav>
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="admindashboard.html" style="text-decoration:none;">Home</a></li>
    <li class="breadcrumb-item"><a href="#" style="text-decoration:none;">Admin</a></li>
    <li class="breadcrumb-item active">Subjects</li>
  </ol>
</nav>

<!-- Title -->
<h2 style="font-weight:bold; color:black;">MANAGE SUBJECTS</h2>

<p style="color:gray;">
View and manage all academic subjects available in the system
</p>

<!-- Search and Button -->
<div class="d-flex justify-content-between align-items-center mb-3">

<input type="text" class="form-control w-50"
placeholder="Search subjects by name or ID..."
style="outline:none; box-shadow:none;">

<button class="btn btn-primary">
New Subject
</button>

</div>

<!-- Table -->
<div class="card shadow-sm">
<div class="card-body">

<table class="table table-hover">

<thead class="table-light">
<tr>
<th>SUBJECT ID</th>
<th>SUBJECT NAME</th>
<th>ACTIONS</th>
</tr>
</thead>

<tbody id="subjectTable">

<tr>
<td>SUB101</td>
<td>Mathematics</td>
<td>
<button class="btn btn-sm btn-warning">Edit</button>
<button class="btn btn-sm btn-danger">Delete</button>
</td>
</tr>

<tr>
<td>SUB102</td>
<td>Physics</td>
<td>
<button class="btn btn-sm btn-warning">Edit</button>
<button class="btn btn-sm btn-danger">Delete</button>
</td>
</tr>

<tr>
<td>SUB103</td>
<td>Chemistry</td>
<td>
<button class="btn btn-sm btn-warning">Edit</button>
<button class="btn btn-sm btn-danger">Delete</button>
</td>
</tr>

</tbody>

</table>

</div>
</div>

<!-- Pagination -->
<div class="d-flex justify-content-center mt-3">

<button class="btn btn-outline-secondary me-2">
&#9664;
</button>

<button class="btn btn-outline-secondary">
&#9654;
</button>

</div>

</div>

<script>

const searchInput = document.querySelector("input");
const rows = document.querySelectorAll("#subjectTable tr");

searchInput.addEventListener("keyup", function() {

let filter = searchInput.value.toLowerCase();

rows.forEach(row => {

let text = row.textContent.toLowerCase();

row.style.display = text.includes(filter) ? "" : "none";

});

});

</script>

</body>
</html>
