<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Attempt</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
       @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;800;900&display=swap');

    body {
    font-family: 'Poppins', sans-serif;
     
    }
</style>
</head>
<body style="background-color:#f4f6f9; font-family: Arial, sans-serif;">

<!-- Navbar -->
<nav class="navbar bg-white shadow-sm px-4 py-2 d-flex justify-content-between align-items-center">
    <div class="fw-bold" style="font-size:18px;">
       <span id="quizTitle">Loading...</span>
        <div style="font-size:12px; color:gray;">
            <div id="quizSubject" style="font-size:12px; color:gray;">Loading...
            </div>
        </div>
    </div>

    <div class="d-flex align-items-center gap-3">
        <div class="px-3 py-1 rounded-pill" style="background:#eaf3ff; font-size:14px;">
            ⏱ 45 : 21
        </div>

        <div class="d-flex align-items-center gap-2">
            <img src="https://i.pravatar.cc/30" style="border-radius:50%;" alt="user">
           <span id="studentName" style="font-size:14px;">Student</span>
        </div>
    </div>
</nav>

<!-- Main Container -->
<div class="container-fluid mt-3">
    <div class="row g-3">

        <!-- LEFT SECTION -->
        <div class="col-lg-9">

            <div class="card shadow-sm p-4" style="border-radius:10px;">

                <!-- Question Header -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                       <span id="questionCounter"
      style="font-size:12px; color:#0d6efd; font-weight:600;">
    Loading... 
                    </span>
                    <span>🏳️</span>
                </div>

                

                <!-- Question -->
                <p id="questionText" style="font-size:14px;"></p>

               <!-- Options -->
<div id="options">
</div>

                <!-- Navigation Buttons -->
                <div class="d-flex justify-content-between mt-4">
                   <button id="prevBtn"
        class="btn btn-light border"
        onclick="previousQuestion()">
    ← Previous
</button>
                    <button id="nextBtn"
        class="btn btn-primary px-4"
        onclick="handleNext()">
    Next →
</button>
                </div>

            </div>
        </div>

        <!-- RIGHT SECTION -->
        <div class="col-lg-3">

            <div class="card shadow-sm p-3" style="border-radius:10px;">

                <div class="d-flex justify-content-between mb-2">
                    <strong style="font-size:14px;">Question Navigator</strong>
                   <span id="answeredCount" style="font-size:12px; color:gray;">
    0/0 Answered
</span>
                </div>

                <!-- Grid -->
                <div id="questionNavigator"
     class="d-grid"
     style="grid-template-columns: repeat(5,1fr); gap:8px;">
</div>

                <!-- Legend -->
                <div class="mt-3" style="font-size:12px;">
                    <div class="d-flex align-items-center mb-1">
                        <span style="width:10px;height:10px;background:#ffc107;display:inline-block;margin-right:6px;"></span>
                        Answered
                    </div>
                    <div class="d-flex align-items-center mb-1">
                        <span style="width:10px;height:10px;background:#0d6efd;display:inline-block;margin-right:6px;"></span>
                        Current
                    </div>
                    <div class="d-flex align-items-center">
                        <span style="width:10px;height:10px;background:#ccc;display:inline-block;margin-right:6px;"></span>
                        Unanswered
                    </div>
                </div>

                <!-- Submit -->
                <button onclick="submitQuiz()" class="btn btn-danger w-100 mt-3">
                    Submit Quiz
                </button>

            </div>

        </div>

    </div>
</div>

<!-- JS -->
 <script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user"));
const quizId = localStorage.getItem("currentQuizId");

if (!token || !user || !quizId) {
    alert("Session expired or no quiz selected.");
    window.location.href = "availableQuizzes.html";
}

document.getElementById("studentName").textContent = user.name;

let quizData = null;
let currentQuestionIndex = 0;
let answers = {};

/* Load quiz from backend */
async function loadQuiz() {
    try {
        const response = await fetch(
            `http://localhost:8080/api/student/quizzes/${quizId}`,
            {
                headers: {
                    "Authorization": "Bearer " + token
                }
            }
        );

        if (!response.ok) {
            throw new Error("Failed to load quiz");
        }

        quizData = await response.json();

        document.getElementById("quizTitle").textContent =
            quizData.title;

        document.getElementById("quizSubject").textContent =
            quizData.subject || "";

        renderQuestion();

    } catch (error) {
        console.error(error);
        alert("Unable to load quiz.");
    }
}

/* Render current question */
function renderQuestion() {
    const question = quizData.questions[currentQuestionIndex];

    document.getElementById("questionCounter").textContent =
        `QUESTION ${currentQuestionIndex + 1} OF ${quizData.questions.length}`;

    document.getElementById("questionText").textContent =
        question.questionText;

    const optionsContainer =
        document.getElementById("options");

    optionsContainer.innerHTML = "";

    question.options.forEach((option, index) => {
        const selected =
            answers[question.id] === option.id;

        const div = document.createElement("div");

        div.className =
            "p-3 mb-3 border rounded d-flex align-items-center";

        div.style.cursor = "pointer";

        if (selected) {
            div.style.border = "2px solid #0d6efd";
        }

        div.innerHTML = `
            <input type="radio"
                   class="me-2"
                   ${selected ? "checked" : ""}>
            <strong class="me-2">
                ${String.fromCharCode(65 + index)}.
            </strong>
            <span>${option.optionText}</span>
        `;

        div.onclick = () =>
            selectOption(question.id, option.id);

        optionsContainer.appendChild(div);
    });

   updateNavigationButtons();
renderQuestionNavigator();
}

/* Save selected answer */
function selectOption(questionId, optionId) {
    answers[questionId] = optionId;
    renderQuestion();
}

/* Previous question */
function previousQuestion() {
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
    }
}

/* Next question */
function nextQuestion() {
    if (currentQuestionIndex <
        quizData.questions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
    }
}

/* Update button labels/states */
function updateNavigationButtons() {
    const prevBtn =
        document.getElementById("prevBtn");

    const nextBtn =
        document.getElementById("nextBtn");

    prevBtn.disabled =
        currentQuestionIndex === 0;

    if (currentQuestionIndex ===
        quizData.questions.length - 1) {
        nextBtn.textContent = "Finish";
    } else {
        nextBtn.textContent = "Next →";
    }
}

/* Submit placeholder */
function submitQuiz() {
    if (confirm("Submit this quiz?")) {
        console.log("Selected answers:", answers);
        alert("Quiz submitted successfully!");
        localStorage.removeItem("currentQuizId");
        window.location.href = "availableQuizzes.html";
    }
}

/* Next button behavior */
function handleNext() {
    if (currentQuestionIndex ===
        quizData.questions.length - 1) {
        submitQuiz();
    } else {
        nextQuestion();
    }
}

/* Start */
loadQuiz();
function renderQuestionNavigator() {
    const navigator =
        document.getElementById("questionNavigator");

    const answeredCountElement =
        document.getElementById("answeredCount");

    navigator.innerHTML = "";

    const totalQuestions = quizData.questions.length;
    const answeredQuestions =
        Object.keys(answers).length;

    answeredCountElement.textContent =
        `${answeredQuestions}/${totalQuestions} Answered`;

    quizData.questions.forEach((question, index) => {
        const button = document.createElement("div");

        let background = "#f1f1f1"; // unanswered
        let color = "black";

        // Current question
        if (index === currentQuestionIndex) {
            background = "#0d6efd";
            color = "white";
        }
        // Answered but not current
        else if (answers[question.id]) {
            background = "#ffc107";
            color = "black";
        }

        button.style.cssText = `
            padding: 8px;
            text-align: center;
            border-radius: 6px;
            background: ${background};
            color: ${color};
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        `;

        button.textContent = index + 1;

        button.onclick = function () {
            currentQuestionIndex = index;
            renderQuestion();
        };

        navigator.appendChild(button);
    });
}
</script>

</body>
</html>
