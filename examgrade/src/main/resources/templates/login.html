<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Exam Grade - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f3f6fb;
    font-family:system-ui,-apple-system,sans-serif;
}

/* CENTER */
.login-wrapper{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.login-card{
    background:white;
    padding:40px;
    border-radius:14px;
    width:100%;
    max-width:450px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* BRAND */
.brand{
    color:#2f6df6;
    font-weight:700;
}

/* ROLE TABS */
.role-tabs .nav-link{
    border-radius:8px;
    color:#6c757d;
    font-weight:500;
}

.role-tabs .nav-link.active{
    background:#2f6df6;
    color:white;
}

/* INPUT */
.form-control{
    height:48px;
    border-radius:8px;
}

/* BUTTON */
.btn-login{
    background:#2f6df6;
    color:white;
    height:48px;
    border-radius:8px;
    font-weight:600;
}

.btn-login:hover{
    background:#2559cc;
    color:white;
}

/* LINKS */
.small-link{
    font-size:14px;
    text-decoration:none;
    color:#6c757d;
}

.small-link:hover{
    color:#2f6df6;
}

</style>
</head>

<body>

<div class="login-wrapper">
<div class="login-card">

<!-- TITLE -->
<div class="text-center mb-4">
    <h3 class="brand">Exam Grade</h3>
    <p class="text-muted">Login to continue</p>
</div>

<!-- ROLE TABS -->
<ul class="nav nav-pills nav-fill mb-4 role-tabs">
    <li class="nav-item">
        <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#admin">Admin</button>
    </li>
    <li class="nav-item">
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#teacher">Teacher</button>
    </li>
    <li class="nav-item">
        <button class="nav-link" data-bs-toggle="pill" data-bs-target="#student">Student</button>
    </li>
</ul>

<div class="tab-content">

<!-- ADMIN -->
<div class="tab-pane fade show active" id="admin">
<form>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="Admin email">
    </div>

    <div class="mb-2">
        <label>Password</label>
        <input type="password" class="form-control" placeholder="Password">
    </div>

    <div class="d-flex justify-content-end mb-3">
        <a href="#" class="small-link">Forgot Password?</a>
    </div>

    <button class="btn btn-login w-100">Login as Admin</button>
</form>
</div>

<!-- TEACHER -->
<div class="tab-pane fade" id="teacher">
<form>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="Teacher email">
    </div>

    <div class="mb-2">
        <label>Password</label>
        <input type="password" class="form-control" placeholder="Password">
    </div>

    <div class="d-flex justify-content-end mb-3">
        <a href="#" class="small-link">Forgot Password?</a>
    </div>

    <button class="btn btn-login w-100">Login as Teacher</button>
</form>
</div>

<!-- STUDENT -->
<div class="tab-pane fade" id="student">
<form>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" class="form-control" placeholder="Student email">
    </div>

    <div class="mb-2">
        <label>Password</label>
        <input type="password" class="form-control" placeholder="Password">
    </div>

    <div class="d-flex justify-content-end mb-3">
        <a href="#" class="small-link">Forgot Password?</a>
    </div>

    <button class="btn btn-login w-100">Login as Student</button>
</form>
</div>

</div>

<!-- REGISTER -->
<div class="text-center mt-4">
    <span class="text-muted">Don't have an account?</span>
    <a href="register.html" class="small-link fw-semibold">Register</a>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
